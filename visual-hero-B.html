<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visual Hero B — Cursor Repulsion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: none; }
  canvas { display: block; cursor: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 520;
canvas.height = 520;
const W = canvas.width;
const H = canvas.height;

// ── Tiempos ────────────────────────────────────────────────
const PIXEL_PHASE_MS = 2000;
const ASSEMBLE_MS    = 4500;
const START_TIME = performance.now();

// ── Cursor ─────────────────────────────────────────────────
const mouse = { x: -9999, y: -9999 };
const REPEL_RADIUS = 90;
const REPEL_FORCE  = 6;
const RETURN_SPEED = 0.08;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', () => {
  mouse.x = -9999; mouse.y = -9999;
});

// ── Colores ────────────────────────────────────────────────
function nodeColor(t) {
  const r = Math.round(124 + (6   - 124) * t);
  const g = Math.round(58  + (182 - 58)  * t);
  const b = Math.round(237 + (212 - 237) * t);
  return { r, g, b };
}

// ── Nodos ──────────────────────────────────────────────────
const TOTAL_NODES = 55;
const CONNECTION_DIST = 110;
const nodes = [];

for (let i = 0; i < TOTAL_NODES; i++) {
  const tx = 50 + Math.random() * (W - 100);
  const ty = 50 + Math.random() * (H - 100);
  const sx = Math.random() * W;
  const sy = Math.random() * H;
  const t  = i / TOTAL_NODES;
  const c  = nodeColor(t);
  const r  = Math.random() < 0.15 ? 5 + Math.random() * 3 : 2 + Math.random() * 2;
  const vx = (Math.random() - 0.5) * 0.35;
  const vy = (Math.random() - 0.5) * 0.35;

  nodes.push({
    sx, sy,
    tx, ty,       // destino post-ensamblaje (posición "home")
    x: sx, y: sy,
    ox: tx, oy: ty, // posición "home" actual (para regresar)
    r, c, vx, vy, t,
    // offset de repulsión (se suaviza de vuelta a 0)
    rx: 0, ry: 0,
  });
}

// ── Easing ─────────────────────────────────────────────────
function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

// ── Cursor visual ──────────────────────────────────────────
function drawCursor() {
  if (mouse.x < 0) return;
  // anillo exterior
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, REPEL_RADIUS, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(167,139,250,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // punto central
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(167,139,250,0.6)';
  ctx.fill();
}

// ── Loop ───────────────────────────────────────────────────
function draw(now) {
  requestAnimationFrame(draw);
  const elapsed = now - START_TIME;
  ctx.clearRect(0, 0, W, H);

  const assembleElapsed  = elapsed - PIXEL_PHASE_MS;
  const assembleProgress = Math.min(assembleElapsed / ASSEMBLE_MS, 1);
  const easedP = easeOutCubic(Math.max(assembleProgress, 0));
  const assembled = assembleProgress >= 1;

  // ── Fase 1: píxeles ────────────────────────────────────
  if (elapsed < PIXEL_PHASE_MS) {
    nodes.forEach(n => {
      const flicker = 0.3 + 0.7 * Math.random();
      ctx.beginPath();
      ctx.arc(n.sx, n.sy, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${n.c.r},${n.c.g},${n.c.b},${flicker})`;
      ctx.fill();
    });
    applyVignette();
    drawCursor();
    return;
  }

  // ── Mover nodos ────────────────────────────────────────
  nodes.forEach(n => {
    if (!assembled) {
      // interpolación hacia home durante ensamblaje
      n.x = n.sx + (n.tx - n.sx) * easedP;
      n.y = n.sy + (n.ty - n.sy) * easedP;
      n.ox = n.x; n.oy = n.y;
      n.rx = 0; n.ry = 0;
    } else {
      // deriva suave con rebote
      n.ox += n.vx;
      n.oy += n.vy;
      if (n.ox < 20 || n.ox > W - 20) n.vx *= -1;
      if (n.oy < 20 || n.oy > H - 20) n.vy *= -1;

      // repulsión del cursor
      const dx = n.ox - mouse.x;
      const dy = n.oy - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < REPEL_RADIUS && dist > 0) {
        const force = (1 - dist / REPEL_RADIUS) * REPEL_FORCE;
        const nx = dx / dist;
        const ny = dy / dist;
        n.rx += nx * force;
        n.ry += ny * force;
      }

      // el offset de repulsión regresa suavemente a 0
      n.rx *= (1 - RETURN_SPEED);
      n.ry *= (1 - RETURN_SPEED);

      n.x = n.ox + n.rx;
      n.y = n.oy + n.ry;
    }
  });

  // ── Conexiones ─────────────────────────────────────────
  const lineAlpha = Math.min(easedP * 1.4, 1);
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < CONNECTION_DIST) {
        const alpha = lineAlpha * (1 - dist / CONNECTION_DIST) * 0.45;
        const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        grad.addColorStop(0, `rgba(${a.c.r},${a.c.g},${a.c.b},${alpha})`);
        grad.addColorStop(1, `rgba(${b.c.r},${b.c.g},${b.c.b},${alpha})`);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }
  }

  // ── Nodos ──────────────────────────────────────────────
  nodes.forEach(n => {
    const alpha = Math.min(easedP * 1.5, 1);
    const glow = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 5);
    glow.addColorStop(0, `rgba(${n.c.r},${n.c.g},${n.c.b},${alpha * 0.2})`);
    glow.addColorStop(1, `rgba(${n.c.r},${n.c.g},${n.c.b},0)`);
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r * 5, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${n.c.r},${n.c.g},${n.c.b},${alpha})`;
    ctx.fill();
  });

  applyVignette();
  drawCursor();
}

function applyVignette() {
  const v = ctx.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.75);
  v.addColorStop(0, 'rgba(10,10,20,0)');
  v.addColorStop(1, 'rgba(10,10,20,0.75)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
